[project]
name = "forge-test"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Flet developer", email = "you@example.com" }
]
dependencies = [
    "flet >=0.86.0",
    "flet-camera >=0.86.0",
    "ncnn",
    "opencv-python",
    "numpy",
]

[dependency-groups]
dev = [
    "flet-cli >=0.86.0",
    "flet-desktop >=0.86.0",
    "flet-web >=0.86.0",
    # Integration testing with `flet test` / pytest. The `test` extra brings in
    # pytest, pytest-asyncio and the screenshot-comparison dependencies.
    "flet[test] >=0.86.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.flet]
org = "com.mycompany"
product = "forge-test"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"

[tool.flet.app]
path = "src"

[tool.flet.android]
target_arch = ["arm64-v8a", "armeabi-v7a", "x86_64"]
# https://flet.dev/docs/publish/android#extract-packages
# extract_packages = ["cv2"]
