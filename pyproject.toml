[project]
name = "laptop-detect"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Flet developer", email = "you@example.com" }
]
dependencies = [
    "flet >=0.86.0.dev0",
    "langchain>=1.3.4",
    "pydantic-core>=2.46.4",
]

[dependency-groups]
dev = [
    "flet-cli >=0.86.0.dev0",
    "flet-desktop >=0.86.0.dev0",
    "flet-web >=0.86.0.dev0",
    # Integration testing with `flet test` / pytest. The `test` extra brings in
    # pytest, pytest-asyncio and the screenshot-comparison dependencies.
    "flet[test]>=0.85.3",
]


[tool.flet]
org = "com.mycompany"
product = "laptop-detect"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"

[tool.flet.app]
path = "src"
