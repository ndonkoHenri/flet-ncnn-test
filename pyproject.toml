[project]
name = "forge-test"
version = "0.1.0"
description = ""
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Flet developer", email = "you@example.com" }
]
dependencies = [
    "flet >=0.86.0",
    "flet-camera >=0.86.0",
    "ncnn",
    "numpy",
    "opencv-python",
    "pillow",
]

[dependency-groups]
dev = [
    "flet-cli >=0.86.0",
    "flet-desktop >=0.86.0",
    "flet-web >=0.86.0",
    # Integration testing with `flet test` / pytest. The `test` extra brings in
    # pytest, pytest-asyncio and the screenshot-comparison dependencies.
    "flet[test] >=0.86.0",
]

[tool.flet]
org = "com.mycompany"
product = "forge-test"
company = "Flet"
copyright = "Copyright (C) 2023-2026 by Flet"

[tool.flet.app]
path = "src"

# opencv's cv2/__init__.py bootstrap reads its config by a real __file__ path
# (os.path.exists("config.py") + os.listdir), which fails inside Flet 0.86's
# compressed sitepackages.zip ("missing configuration file: ['config.py']").
# Ship cv2 extracted to disk so those reads resolve. (Android only.)
[tool.flet.android]
extract_packages = ["cv2"]
